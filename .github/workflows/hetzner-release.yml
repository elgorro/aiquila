name: Hetzner CLI Release

on:
  push:
    branches:
      - main
    paths:
      - 'hetzner/**'
      - '!hetzner/**/*.md'

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version-changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
      previous-version: ${{ steps.check.outputs.previous }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: check
        run: |
          CURRENT=$(cat hetzner/VERSION)
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

          PREVIOUS=$(git show HEAD~1:hetzner/VERSION 2>/dev/null || echo "0.0.0")
          echo "previous=$PREVIOUS" >> $GITHUB_OUTPUT

          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed from $PREVIOUS to $CURRENT"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged: $CURRENT"
          fi

  release:
    needs: check-version
    if: needs.check-version.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: hetzner/go.mod

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Build Linux binaries
        run: |
          VERSION=$(cat hetzner/VERSION)
          mkdir -p dist
          cd hetzner
          GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${VERSION}" \
            -o ../dist/aiquila-hetzner-linux-amd64 ./cmd/aiquila-hetzner
          GOOS=linux GOARCH=arm64 go build -ldflags "-X main.version=${VERSION}" \
            -o ../dist/aiquila-hetzner-linux-arm64 ./cmd/aiquila-hetzner

      - name: Generate checksums and sign artifacts
        run: |
          cd dist
          sha256sum aiquila-hetzner-linux-amd64 aiquila-hetzner-linux-arm64 > checksums.txt
          for f in aiquila-hetzner-linux-amd64 aiquila-hetzner-linux-arm64 checksums.txt; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "${f}"
          done

      - name: Generate changelog
        run: |
          VERSION=$(cat hetzner/VERSION)
          PREV_VERSION=${{ needs.check-version.outputs.previous-version }}
          PREV_TAG="hetzner-v${PREV_VERSION}"

          if git rev-parse "${PREV_TAG}" >/dev/null 2>&1; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          CHANGELOG=$(git log ${RANGE} --pretty=format:"%s" -- hetzner/ | awk -F: '
            /^feat/  { feats = feats "\n- " substr($0, index($0,":")+2) }
            /^fix/   { fixes = fixes "\n- " substr($0, index($0,":")+2) }
            /^chore|^docs|^refactor|^perf|^ci|^test/ { other = other "\n- " substr($0, index($0,":")+2) }
            END {
              if (feats) printf "### Features%s\n\n", feats
              if (fixes) printf "### Bug Fixes%s\n\n", fixes
              if (other) printf "### Other Changes%s\n\n", other
            }
          ')

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="No conventional commits found for this release."
          fi

          cat > /tmp/release-body.txt << ENDOFBODY
          ## aiquila-hetzner v${VERSION}

          ${CHANGELOG}

          Single-command provisioner for AIquila MCP Server on Hetzner Cloud.

          ### Installation

          \`\`\`bash
          # Linux amd64
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/hetzner-v${VERSION}/aiquila-hetzner-linux-amd64 \\
            -o aiquila-hetzner
          chmod +x aiquila-hetzner
          sudo mv aiquila-hetzner /usr/local/bin/

          # Linux arm64
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/hetzner-v${VERSION}/aiquila-hetzner-linux-arm64 \\
            -o aiquila-hetzner
          chmod +x aiquila-hetzner
          sudo mv aiquila-hetzner /usr/local/bin/
          \`\`\`

          ### Verify

          \`\`\`bash
          aiquila-hetzner --version
          \`\`\`

          ### Verify integrity

          **Checksum (simple):**
          \`\`\`bash
          sha256sum --check checksums.txt
          \`\`\`

          **Cosign (cryptographic, proves built by this repo's CI):**
          \`\`\`bash
          cosign verify-blob \\
            --certificate=aiquila-hetzner-linux-amd64.pem \\
            --signature=aiquila-hetzner-linux-amd64.sig \\
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/hetzner-release.yml" \\
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \\
            aiquila-hetzner-linux-amd64
          \`\`\`

          ### Requirements
          - \`HCLOUD_TOKEN\` environment variable (Hetzner Cloud API token)
          - Nextcloud instance with app password

          ---
          *This release was automatically created by GitHub Actions*
          ENDOFBODY

          sed -i 's/^          //' /tmp/release-body.txt

      - name: Create Git tag
        run: |
          VERSION=$(cat hetzner/VERSION)
          TAG_NAME="hetzner-v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "${TAG_NAME}" -m "aiquila-hetzner Release ${VERSION}"
          git push origin "${TAG_NAME}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: hetzner-v${{ needs.check-version.outputs.version }}
          name: aiquila-hetzner v${{ needs.check-version.outputs.version }}
          body_path: /tmp/release-body.txt
          files: |
            dist/aiquila-hetzner-linux-amd64
            dist/aiquila-hetzner-linux-amd64.sig
            dist/aiquila-hetzner-linux-amd64.pem
            dist/aiquila-hetzner-linux-arm64
            dist/aiquila-hetzner-linux-arm64.sig
            dist/aiquila-hetzner-linux-arm64.pem
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
