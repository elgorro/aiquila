name: Hetzner Integration Test

on:
  workflow_dispatch:
    inputs:
      nc_domain:
        description: 'FQDN for Nextcloud test server (e.g. nc-inttest.example.com)'
        required: true
      mcp_domain:
        description: 'FQDN for MCP test server (e.g. mcp-inttest.example.com)'
        required: true
      dns_zone:
        description: 'Hetzner DNS zone (e.g. example.com)'
        required: true
      nc_server_type:
        description: 'Hetzner server type for Nextcloud server'
        required: false
        default: 'cpx21'
      mcp_server_type:
        description: 'Hetzner server type for MCP server'
        required: false
        default: 'cpx11'
      run_oauth_test:
        description: 'Run OAuth PKCE flow test'
        type: boolean
        default: true
      run_tools_test:
        description: 'Run MCP tools functional test'
        type: boolean
        default: true
      run_mcp_protocol_test:
        description: 'Run MCP protocol conformance check'
        type: boolean
        default: true
      run_nc_app_test:
        description: 'Run Nextcloud AIquila app API check'
        type: boolean
        default: true
      run_connector_test:
        description: 'Run MCP-Connector test (uses Anthropic API)'
        type: boolean
        default: false
      run_infra_test:
        description: 'Run infrastructure checks (TLS, CrowdSec)'
        type: boolean
        default: true

jobs:
  integration-test:
    runs-on: ubuntu-latest
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      HETZNER_DNS_TOKEN: ${{ secrets.HETZNER_DNS_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NC_DOMAIN: ${{ inputs.nc_domain }}
      MCP_DOMAIN: ${{ inputs.mcp_domain }}
      DNS_ZONE: ${{ inputs.dns_zone }}
      NC_SERVER_TYPE: ${{ inputs.nc_server_type }}
      MCP_SERVER_TYPE: ${{ inputs.mcp_server_type }}
      RUN_OAUTH_TEST: ${{ inputs.run_oauth_test }}
      RUN_TOOLS_TEST: ${{ inputs.run_tools_test }}
      RUN_MCP_PROTOCOL_TEST: ${{ inputs.run_mcp_protocol_test }}
      RUN_NC_APP_TEST: ${{ inputs.run_nc_app_test }}
      RUN_CONNECTOR_TEST: ${{ inputs.run_connector_test }}
      RUN_INFRA_TEST: ${{ inputs.run_infra_test }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Mask sensitive inputs
        run: |
          echo "::add-mask::${{ inputs.nc_domain }}"
          echo "::add-mask::${{ inputs.mcp_domain }}"
          echo "::add-mask::${{ inputs.dns_zone }}"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: hetzner/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install script dependencies
        working-directory: hetzner/scripts
        run: npm install

      - name: Run integration test agent
        working-directory: hetzner/scripts
        run: |
          export PATH="$(dirname "$(which node)"):$PATH"
          npx tsx integration-test.ts

      - name: Safety-net destroy (always runs)
        if: always()
        run: |
          # Build the binary (may already exist from agent's work)
          cd hetzner && go build -o /tmp/aiquila-hetzner ./cmd/aiquila-hetzner || true
          # Best-effort destroy of any nc-inttest-* or mcp-inttest-* servers
          # that the agent may have failed to clean up.
          /tmp/aiquila-hetzner list 2>/dev/null | grep -E "nc-inttest-|mcp-inttest-" | awk '{print $1}' | while read -r name; do
            echo "Safety-net: destroying $name"
            /tmp/aiquila-hetzner destroy --name "$name" --dns-zone "$DNS_ZONE" || true
          done
