# AIquila Full Stack — Hetzner Production (Nextcloud + MCP on one server)
# Nextcloud 33 + PostgreSQL + Redis + MCP Server + Traefik v3 + CrowdSec
#
# MCP talks to Nextcloud over the internal Docker network (http://nc) —
# no HTTPS overhead, no external DNS dependency between services.
#
# Usage:
#   cp .env.example .env  &&  edit with your credentials
#   docker compose build
#   docker compose up -d
#   # Poll NC_DOMAIN/status.php until {"installed":true} (~3-5 min first boot)

services:
  nc:
    build: .
    image: aiq-nc:local
    container_name: aiq-nc
    restart: unless-stopped
    depends_on:
      nc-db:
        condition: service_healthy
      nc-redis:
        condition: service_started
    environment:
      POSTGRES_HOST: nc-db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      REDIS_HOST: nc-redis
      NEXTCLOUD_ADMIN_USER: ${NC_ADMIN_USER:?Set NC_ADMIN_USER in .env}
      NEXTCLOUD_ADMIN_PASSWORD: ${NC_ADMIN_PASSWORD:?Set NC_ADMIN_PASSWORD in .env}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NC_DOMAIN:?Set NC_DOMAIN in .env}
      NEXTCLOUD_TRUSTED_PROXIES: 172.16.0.0/12
      OVERWRITEHOST: ${NC_DOMAIN}
      OVERWRITEPROTOCOL: https
      OVERWRITECLIURL: https://${NC_DOMAIN}
      # NC33 built-in metrics app — token for /metrics?token= endpoint
      NC_METRICS_TOKEN: ${NC_METRICS_TOKEN:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nc.rule=Host(`${NC_DOMAIN}`)"
      - "traefik.http.routers.nc.entrypoints=websecure"
      - "traefik.http.routers.nc.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nc.middlewares=crowdsec@docker,nc-headers@docker"
      - "traefik.http.services.nc.loadbalancer.server.port=80"
      # Security / Nextcloud-recommended headers
      - "traefik.http.middlewares.nc-headers.headers.stsSeconds=15552000"
      - "traefik.http.middlewares.nc-headers.headers.stsIncludeSubdomains=true"
      # CrowdSec bouncer middleware — defined once, referenced by all routers
      - "traefik.http.middlewares.crowdsec.plugin.crowdsec-bouncer-traefik-plugin.crowdseclapikey=${CROWDSEC_BOUNCER_KEY}"
      - "traefik.http.middlewares.crowdsec.plugin.crowdsec-bouncer-traefik-plugin.crowdseclapischeme=http"
      - "traefik.http.middlewares.crowdsec.plugin.crowdsec-bouncer-traefik-plugin.crowdseclapihost=crowdsec:8080"
    volumes:
      - nc_data:/var/www/html
    networks:
      - aiq-net
    deploy:
      resources:
        limits:
          memory: 1g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nc-db:
    image: postgres:16
    container_name: aiq-nc-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - nc_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiq-net
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nc-redis:
    image: redis:7-alpine
    container_name: aiq-nc-redis
    restart: unless-stopped
    volumes:
      - nc_redis_data:/data
    networks:
      - aiq-net
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mcp:
    image: ghcr.io/elgorro/aiquila-mcp:latest
    container_name: aiq-mcp
    restart: unless-stopped
    depends_on:
      - nc
    environment:
      # MCP talks to Nextcloud over the internal Docker network — no HTTPS needed
      NEXTCLOUD_URL: http://nc
      NEXTCLOUD_USER: ${NC_MCP_USER}
      NEXTCLOUD_PASSWORD: ${NC_MCP_PASSWORD}
      NODE_ENV: production
      MCP_TRANSPORT: http
      MCP_PORT: "${MCP_PORT:-3339}"
      MCP_AUTH_ENABLED: ${MCP_AUTH_ENABLED:-true}
      MCP_AUTH_SECRET: ${MCP_AUTH_SECRET:?Set MCP_AUTH_SECRET in .env}
      MCP_AUTH_ISSUER: ${MCP_AUTH_ISSUER:?Set MCP_AUTH_ISSUER in .env}
      MCP_CLIENT_ID: ${MCP_CLIENT_ID:-aiquila-claude}
      MCP_CLIENT_SECRET: ${MCP_CLIENT_SECRET:-}
      MCP_REGISTRATION_ENABLED: ${MCP_REGISTRATION_ENABLED:-false}
      MCP_REGISTRATION_TOKEN: ${MCP_REGISTRATION_TOKEN:-}
      MCP_CLIENT_REDIRECT_URIS: ${MCP_CLIENT_REDIRECT_URIS:-https://claude.ai/api/mcp/auth_callback}
      MCP_TRUST_PROXY: "1" # hardcoded: Traefik is always a single proxy hop
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - mcp_state:/app/state
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcp.rule=Host(`${MCP_DOMAIN}`)"
      - "traefik.http.routers.mcp.entrypoints=websecure"
      - "traefik.http.routers.mcp.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mcp.middlewares=crowdsec@docker"
      - "traefik.http.services.mcp.loadbalancer.server.port=${MCP_PORT:-3339}"
    networks:
      - aiq-net
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:' + (process.env.MCP_PORT||'3339') + '/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    container_name: aiq-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      EVENTS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - aiq-net
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 32m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  traefik:
    image: traefik:v3
    container_name: aiq-traefik
    restart: unless-stopped
    depends_on:
      - socket-proxy
      - crowdsec
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_certs:/certs
      - logs:/logs
    networks:
      - aiq-net
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: aiq-crowdsec
    restart: unless-stopped
    environment:
      COLLECTIONS: crowdsecurity/traefik
      BOUNCER_KEY_traefik: ${CROWDSEC_BOUNCER_KEY:?Set CROWDSEC_BOUNCER_KEY in .env}
    volumes:
      - crowdsec_db:/var/lib/crowdsec/data
      - ./crowdsec:/etc/crowdsec/acquis.d:ro
      - logs:/logs:ro
    networks:
      - aiq-net
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mcp_state:
    name: aiq-full_mcp_state
  nc_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/aiquila/data/nc
  nc_db_data:
    name: aiq-full_nc_db_data
  nc_redis_data:
    name: aiq-full_nc_redis_data
  traefik_certs:
    name: aiq-full_traefik_certs
  crowdsec_db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/crowdsec
  logs:
    name: aiq-full_logs

networks:
  aiq-net:
    name: aiq-net
    driver: bridge
