# AIquila MCP Server — Hetzner Production (MCP-only stack)
# Traefik v3 reverse proxy + CrowdSec security + optional monitoring
#
# Usage:
#   cp .env.example .env  &&  edit with your credentials
#   docker compose up -d
#   # With monitoring:
#   docker compose --profile monitoring up -d

services:
  mcp:
    image: ghcr.io/elgorro/aiquila-mcp:latest
    container_name: aiq-mcp
    restart: unless-stopped
    environment:
      NEXTCLOUD_URL: ${NEXTCLOUD_URL:?Set NEXTCLOUD_URL in .env}
      NEXTCLOUD_USER: ${NEXTCLOUD_USER:?Set NEXTCLOUD_USER in .env}
      NEXTCLOUD_PASSWORD: ${NEXTCLOUD_PASSWORD:?Set NEXTCLOUD_PASSWORD in .env}
      NODE_ENV: production
      MCP_TRANSPORT: http
      MCP_PORT: "${MCP_PORT:-3339}"
      MCP_AUTH_ENABLED: ${MCP_AUTH_ENABLED:-true}
      MCP_AUTH_SECRET: ${MCP_AUTH_SECRET:?Set MCP_AUTH_SECRET in .env}
      MCP_AUTH_ISSUER: ${MCP_AUTH_ISSUER:?Set MCP_AUTH_ISSUER in .env}
      MCP_CLIENT_ID: ${MCP_CLIENT_ID:-aiquila-claude}
      MCP_CLIENT_SECRET: ${MCP_CLIENT_SECRET:-}
      MCP_REGISTRATION_ENABLED: ${MCP_REGISTRATION_ENABLED:-false}
      MCP_REGISTRATION_TOKEN: ${MCP_REGISTRATION_TOKEN:-}
      MCP_CLIENT_REDIRECT_URIS: ${MCP_CLIENT_REDIRECT_URIS:-https://claude.ai/api/mcp/auth_callback}
      MCP_TRUST_PROXY: "1" # hardcoded: Traefik is always a single proxy hop
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MCP_TLS_STRICT: ${MCP_TLS_STRICT:-true}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcp.rule=Host(`${MCP_DOMAIN}`)"
      - "traefik.http.routers.mcp.entrypoints=websecure"
      - "traefik.http.routers.mcp.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mcp.middlewares=crowdsec@docker"
      - "traefik.http.services.mcp.loadbalancer.server.port=${MCP_PORT:-3339}"
      # CrowdSec bouncer middleware — defined once, referenced by all routers
      - "traefik.http.middlewares.crowdsec.plugin.crowdsec-bouncer-traefik-plugin.crowdseclapikey=${CROWDSEC_BOUNCER_KEY}"
      - "traefik.http.middlewares.crowdsec.plugin.crowdsec-bouncer-traefik-plugin.crowdseclapischeme=http"
      - "traefik.http.middlewares.crowdsec.plugin.crowdsec-bouncer-traefik-plugin.crowdseclapihost=crowdsec:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$${MCP_PORT:-3339}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - mcp_state:/app/state
    networks:
      - aiq-net
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    container_name: aiq-socket-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      EVENTS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - aiq-net
    deploy:
      resources:
        limits:
          memory: 64m
        reservations:
          memory: 32m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  traefik:
    image: traefik:v3
    container_name: aiq-traefik
    restart: unless-stopped
    depends_on:
      - socket-proxy
      - crowdsec
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_certs:/certs
      - logs:/logs
    networks:
      - aiq-net
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: aiq-crowdsec
    restart: unless-stopped
    environment:
      COLLECTIONS: crowdsecurity/traefik
      BOUNCER_KEY_traefik: ${CROWDSEC_BOUNCER_KEY:?Set CROWDSEC_BOUNCER_KEY in .env}
    volumes:
      - crowdsec_db:/var/lib/crowdsec/data
      - ./crowdsec:/etc/crowdsec/acquis.d:ro
      - logs:/logs:ro
    networks:
      - aiq-net
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── monitoring profile ─────────────────────────────────────────────────────
  # Start with: docker compose --profile monitoring up -d

  node-exporter:
    profiles: [monitoring]
    image: prom/node-exporter:latest
    container_name: aiq-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - aiq-net
    deploy:
      resources:
        limits:
          memory: 128m
        reservations:
          memory: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cadvisor:
    profiles: [monitoring]
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: aiq-cadvisor
    restart: unless-stopped
    command:
      - '--housekeeping_interval=30s'
      - '--docker_only=true'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - aiq-net
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:latest
    container_name: aiq-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - aiq-net
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    profiles: [monitoring]
    image: grafana/grafana-oss:latest
    container_name: aiq-grafana
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: "https://${MCP_DOMAIN}/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${MCP_DOMAIN}`) && PathPrefix(`/grafana`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - aiq-net
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mcp_state:
    name: aiq-mcp_state
  traefik_certs:
    name: aiq-mcp_traefik_certs
  crowdsec_db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/crowdsec
  logs:
    name: aiq-mcp_logs
  prometheus_data:
    name: aiq-mcp_prometheus_data
  grafana_data:
    name: aiq-mcp_grafana_data

networks:
  aiq-net:
    name: aiq-net
    driver: bridge
