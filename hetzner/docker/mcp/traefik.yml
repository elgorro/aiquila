# Traefik v3 — AIquila static configuration
# ${ACME_EMAIL} is substituted by the aiquila-hetzner CLI at provisioning time.

api:
  dashboard: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      email: "${ACME_EMAIL}"
      storage: /certs/acme.json
      httpChallenge:
        entryPoint: web

providers:
  docker:
    exposedByDefault: false
    network: aiq-net
    endpoint: "tcp://socket-proxy:2375"

log:
  level: INFO
  format: json

accessLog:
  filePath: /logs/access.log
  format: json
  bufferingSize: 100

experimental:
  plugins:
    crowdsec-bouncer-traefik-plugin:
      moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
      version: v1.3.5
