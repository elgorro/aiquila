# AIquila full-stack deployment
# Stack: full — Nextcloud + MCP server on a single server.
# The MCP server is pre-configured to connect to the co-located Nextcloud
# instance; no external Nextcloud is required.
#
# Usage:
#   aiquila-hetzner create --config deploy.yaml
#
# All commented fields are optional. Remove the '#' to activate them.

# ── Stack ─────────────────────────────────────────────────────────────────────
stack: full

# ── Hetzner Cloud API token ───────────────────────────────────────────────────
# Falls back to the HCLOUD_TOKEN environment variable when omitted.
token: YOUR_HCLOUD_TOKEN

# ── MCP server domain ─────────────────────────────────────────────────────────
# Fully-qualified domain name for the MCP server endpoint.
# A Let's Encrypt TLS certificate is issued automatically.
domain: mcp.example.com

# ── Nextcloud domain ──────────────────────────────────────────────────────────
# Fully-qualified domain name for the Nextcloud instance.
# Must be different from `domain`.
nc_domain: nextcloud.example.com

# ── Nextcloud admin credentials ───────────────────────────────────────────────
# The admin account is created during first-run setup.
# nc_admin_user defaults to "admin" when omitted.
nc_admin_password: CHANGE_ME_STRONG_PASSWORD
# nc_admin_user: admin

# ── AIquila app version ───────────────────────────────────────────────────────
# Pin a specific release of the AIquila Nextcloud app.
# Defaults to the latest published release when omitted.
#
# nc_app_version: 0.4.1

# ── Server configuration ──────────────────────────────────────────────────────
# name:     custom server name in Hetzner (default: auto-generated)
# image:    OS image (default: fedora-43)
# location: Hetzner datacenter (default: nbg1 — Nuremberg)
#           Other options: fsn1 (Falkenstein), hel1 (Helsinki), ash (Ashburn),
#           sin (Singapore)
# type:     server type (default: cpx31 — 4 vCPU, 8 GB RAM)
#           Running both Nextcloud and MCP on one server requires at least
#           cpx31; cpx41 is recommended for heavier workloads.
#           See: hcloud server-type list
# swap:     swap file size, e.g. "2G" (default: no swap)
#
# name:     aiquila-prod
# image:    fedora-43
# location: fsn1
# type:     cx33
# swap:     2G

# ── SSH key ───────────────────────────────────────────────────────────────────
# Path to an existing SSH public key to authorise on the server.
# Supports ~ expansion.  When omitted, a new ed25519 key pair is generated at
# ~/.ssh/aiquila_ed25519 and the public half is uploaded automatically.
#
# ssh_key: ~/.ssh/id_ed25519.pub

# ── Encrypted data volume ─────────────────────────────────────────────────────
# Strongly recommended for production: keeps Nextcloud data on a separate,
# resizable volume and optionally encrypts it with LUKS.
# volume_size must be > 0 when luks: true.
#
# volume_size: 50   # GiB — Nextcloud data directory lives here
# luks: true        # encrypt the volume with LUKS (requires volume_size > 0)

# ── TLS / ACME ────────────────────────────────────────────────────────────────
# Email address for Let's Encrypt certificate notifications.
# Required by the ACME ToS but otherwise optional.
#
# acme_email: ops@example.com

# ── Automatic DNS (Hetzner DNS API) ───────────────────────────────────────────
# When set, A records are created / updated automatically for both `domain`
# and `nc_domain`.
# Falls back to the HETZNER_DNS_TOKEN environment variable when dns_token is
# omitted but dns_zone is present.
#
# dns_zone:  example.com
# dns_token: YOUR_HETZNER_DNS_TOKEN

# ── Firewall: SSH access restriction ─────────────────────────────────────────
# Restrict SSH (port 22) to a specific CIDR range.  Default: unrestricted.
#
# ssh_allow_cidr: 203.0.113.0/24

# ── Server labels ─────────────────────────────────────────────────────────────
# Key=value labels attached to the Hetzner server resource.
#
# labels:
#   - env=production
#   - team=platform

# ── Hetzner Storage Box ───────────────────────────────────────────────────────
# Mount a Hetzner Storage Box at /mnt/storagebox via CIFS.
# Requires Hetzner Robot API credentials (robot_user / robot_password).
# Data persists on the storage box across server deletions.
#
# storage_box: 1234567          # Storage Box ID (Hetzner Robot panel → Storage Boxes)
# robot_user: robot_XXXXXXXX   # Robot API username (env: $HETZNER_ROBOT_USER)
# robot_password: YOUR_ROBOT_PASSWORD  # Robot API password (env: $HETZNER_ROBOT_PASSWORD)
#
# Optional overrides:
# storage_box_password: custom-cifs-password  # default: auto-generated; env: $HETZNER_STORAGE_BOX_PASSWORD
# storage_box_ssh_key: ~/.ssh/aiquila-storagebox.pub  # SSH public key to add; omit to auto-generate ed25519 pair

# ── Extra OS packages ─────────────────────────────────────────────────────────
# Additional packages installed via cloud-init on first boot.
#
#packages:
#  - htop          # process monitor
#  - ncdu          # disk usage analyzer
#  - nano          # text editor
#  - git           # pulling configs/repos
#  - curl          # API calls, debugging
#  - rsync         # file transfers, backups
#  - fail2ban      # brute force protection
#  - bind-utils    # dig/nslookup for DNS debugging
#  - cifs-utils    # mount Hetzner Storage Box via SMB
#  - cryptsetup    # LUKS volume encryption
#  - tmux          # persistent terminal sessions over SSH
#  - lsof          # debug open ports/files
#  - unzip         # extract zip archives
